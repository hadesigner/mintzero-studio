<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MintZero Studio — Agent Chat</title>
<meta name="description" content="MintZero Studio AI 에이전트와 대화하세요. Min, T, Z, E-ro가 기다리고 있습니다.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%233DCFAA'/><ellipse cx='50' cy='50' rx='18' ry='22' fill='white'/><path d='M44,38 C44,36 46,35 48,36 L60,44 C63,46 63,54 60,56 L48,64 C46,65 44,64 44,62 Z' fill='%233DCFAA'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --mint-primary: #3DCFAA;
    --mint-bright: #5CE0C0;
    --mint-light: #E6F9F3;
    --dark: #2D3142;
    --dark-soft: #3D3F54;
    --gray-700: #4A4E69;
    --gray-500: #9AA5B4;
    --gray-300: #CDD5DE;
    --gray-100: #F4F6F8;
    --white: #FFFFFF;
    --min-color: #3DCFAA;
    --t-color: #6C9BF2;
    --z-color: #FFB347;
    --ero-color: #F27BAD;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--gray-100);
    color: var(--dark);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── LAYOUT ─── */
  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: 100vh;
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    background: var(--white);
    border-right: 1px solid var(--gray-100);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--gray-100);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sidebar-header svg { width: 28px; height: 28px; flex-shrink: 0; }
  .sidebar-header .logo-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--dark);
  }
  .sidebar-header .logo-text span { color: var(--mint-primary); }
  .sidebar-header a {
    margin-left: auto;
    font-size: 12px;
    color: var(--gray-500);
    text-decoration: none;
  }
  .sidebar-header a:hover { color: var(--mint-primary); }

  .sidebar-label {
    padding: 20px 24px 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray-500);
  }

  .agent-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px;
  }
  .agent-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 4px;
  }
  .agent-item:hover { background: var(--gray-100); }
  .agent-item.active { background: var(--gray-100); }
  .agent-item .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--white);
    flex-shrink: 0;
    position: relative;
  }
  .agent-item .avatar .status {
    position: absolute;
    bottom: 1px;
    right: 1px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #4ADE80;
    border: 2px solid var(--white);
  }
  .agent-item .info { flex: 1; min-width: 0; }
  .agent-item .info .name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--dark);
  }
  .agent-item .info .role {
    font-size: 12px;
    color: var(--gray-500);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .agent-item.active .info .name { color: var(--mint-primary); }

  /* Group Chat */
  .sidebar-divider {
    height: 1px;
    background: var(--gray-100);
    margin: 8px 24px;
  }
  .agent-item .avatar.group {
    background: var(--dark) !important;
    font-size: 12px;
  }

  /* ─── CHAT AREA ─── */
  .chat-area {
    display: flex;
    flex-direction: column;
    background: var(--white);
    position: relative;
  }

  /* Chat Header */
  .chat-header {
    padding: 16px 28px;
    border-bottom: 1px solid var(--gray-100);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--white);
  }
  .chat-header .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
  }
  .chat-header .header-info .name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
  }
  .chat-header .header-info .desc {
    font-size: 12px;
    color: var(--gray-500);
  }
  .chat-header .traits {
    margin-left: auto;
    display: flex;
    gap: 6px;
  }
  .chat-header .trait-tag {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--gray-100);
    color: var(--gray-700);
    font-weight: 500;
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .message {
    display: flex;
    gap: 12px;
    max-width: 75%;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message.agent { align-self: flex-start; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .message .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--white);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .message.user .msg-avatar {
    background: var(--dark);
    font-size: 10px;
  }

  .msg-content {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .msg-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-500);
  }
  .message.user .msg-name { text-align: right; }
  .msg-bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.7;
    word-break: break-word;
  }
  .message.agent .msg-bubble {
    background: var(--gray-100);
    color: var(--dark);
    border-top-left-radius: 4px;
  }
  .message.user .msg-bubble {
    background: var(--dark);
    color: var(--white);
    border-top-right-radius: 4px;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 12px;
    align-self: flex-start;
    max-width: 75%;
    animation: fadeIn 0.25s ease;
  }
  .typing .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--white);
    flex-shrink: 0;
  }
  .typing-dots {
    background: var(--gray-100);
    padding: 14px 20px;
    border-radius: 16px;
    border-top-left-radius: 4px;
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .typing-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--gray-300);
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input */
  .chat-input-area {
    padding: 16px 28px 24px;
    border-top: 1px solid var(--gray-100);
    background: var(--white);
  }
  .input-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--gray-100);
    border-radius: 14px;
    padding: 6px 8px 6px 20px;
    transition: box-shadow 0.2s;
  }
  .input-wrapper:focus-within {
    box-shadow: 0 0 0 2px var(--mint-primary);
    background: var(--white);
  }
  .input-wrapper input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--dark);
    outline: none;
    padding: 10px 0;
  }
  .input-wrapper input::placeholder { color: var(--gray-300); }
  .send-btn {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 10px;
    background: var(--mint-primary);
    color: var(--white);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #2BB894; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--gray-300); cursor: default; transform: none; }
  .send-btn svg { width: 18px; height: 18px; }

  .input-hint {
    margin-top: 8px;
    font-size: 11px;
    color: var(--gray-300);
    text-align: center;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed;
      left: -300px;
      top: 0;
      bottom: 0;
      width: 280px;
      z-index: 200;
      transition: left 0.3s;
    }
    .sidebar.open { left: 0; }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 199;
    }
    .sidebar.open ~ .sidebar-overlay { display: block; }
    .mobile-toggle {
      display: flex !important;
    }
    .chat-header .traits { display: none; }
  }
  .mobile-toggle {
    display: none;
    width: 36px;
    height: 36px;
    border: none;
    background: var(--gray-100);
    border-radius: 10px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  /* ─── WELCOME ─── */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
    gap: 16px;
  }
  .welcome h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
  }
  .welcome h2 span { color: var(--mint-primary); }
  .welcome p { font-size: 14px; color: var(--gray-500); line-height: 1.8; max-width: 400px; }
  .welcome-agents {
    display: flex;
    gap: 12px;
    margin-top: 12px;
  }
  .welcome-agent {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--white);
    cursor: pointer;
    transition: transform 0.2s;
  }
  .welcome-agent:hover { transform: scale(1.1); }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <svg viewBox="0 0 100 100">
        <defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#5CE0C0"/><stop offset="100%" style="stop-color:#3DCFAA"/></linearGradient></defs>
        <path d="M50,5 C72,5 82,5 89,12 C95,18 95,28 95,50 C95,72 95,82 89,88 C82,95 72,95 50,95 C28,95 18,95 12,88 C5,82 5,72 5,50 C5,28 5,18 12,12 C18,5 28,5 50,5 Z" fill="url(#sg)"/>
        <ellipse cx="50" cy="50" rx="18" ry="22" fill="white" opacity="0.95"/>
        <path d="M44,38 C44,36 46,35 48,36 L60,44 C63,46 63,54 60,56 L48,64 C46,65 44,64 44,62 Z" fill="url(#sg)"/>
      </svg>
      <div class="logo-text">Mint<span>Zero</span></div>
      <a href="/">Home</a>
    </div>

    <div class="sidebar-label">Agents</div>
    <div class="agent-list">
      <div class="agent-item" data-agent="min" onclick="selectAgent('min')">
        <div class="avatar" style="background:var(--min-color);">Min<div class="status"></div></div>
        <div class="info">
          <div class="name">Min</div>
          <div class="role">Game Planner</div>
        </div>
      </div>
      <div class="agent-item" data-agent="t" onclick="selectAgent('t')">
        <div class="avatar" style="background:var(--t-color);">T<div class="status"></div></div>
        <div class="info">
          <div class="name">T</div>
          <div class="role">Game Developer</div>
        </div>
      </div>
      <div class="agent-item" data-agent="z" onclick="selectAgent('z')">
        <div class="avatar" style="background:var(--z-color);">Z<div class="status"></div></div>
        <div class="info">
          <div class="name">Z</div>
          <div class="role">Planner & Marketer</div>
        </div>
      </div>
      <div class="agent-item" data-agent="ero" onclick="selectAgent('ero')">
        <div class="avatar" style="background:var(--ero-color);">E-ro<div class="status"></div></div>
        <div class="info">
          <div class="name">E-ro</div>
          <div class="role">Designer</div>
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="agent-item" data-agent="all" onclick="selectAgent('all')">
        <div class="avatar group" style="background:var(--dark);">ALL<div class="status"></div></div>
        <div class="info">
          <div class="name">Team Chat</div>
          <div class="role">모든 에이전트와 대화</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

  <!-- CHAT -->
  <main class="chat-area" id="chatArea">
    <!-- Welcome screen -->
    <div class="welcome" id="welcomeScreen">
      <svg viewBox="0 0 100 100" width="56">
        <defs><linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#5CE0C0"/><stop offset="100%" style="stop-color:#3DCFAA"/></linearGradient></defs>
        <path d="M50,5 C72,5 82,5 89,12 C95,18 95,28 95,50 C95,72 95,82 89,88 C82,95 72,95 50,95 C28,95 18,95 12,88 C5,82 5,72 5,50 C5,28 5,18 12,12 C18,5 28,5 50,5 Z" fill="url(#wg)"/>
        <ellipse cx="50" cy="50" rx="18" ry="22" fill="white" opacity="0.95"/>
        <path d="M44,38 C44,36 46,35 48,36 L60,44 C63,46 63,54 60,56 L48,64 C46,65 44,64 44,62 Z" fill="url(#wg)"/>
      </svg>
      <h2>Mint<span>Zero</span> Chat</h2>
      <p>AI 에이전트를 선택해서 대화를 시작하세요.<br>각자의 개성으로 여러분과 소통합니다.</p>
      <div class="welcome-agents">
        <div class="welcome-agent" style="background:var(--min-color);" onclick="selectAgent('min')">Min</div>
        <div class="welcome-agent" style="background:var(--t-color);" onclick="selectAgent('t')">T</div>
        <div class="welcome-agent" style="background:var(--z-color);" onclick="selectAgent('z')">Z</div>
        <div class="welcome-agent" style="background:var(--ero-color);" onclick="selectAgent('ero')">E-ro</div>
      </div>
    </div>

    <!-- Active chat (hidden initially) -->
    <div id="chatView" style="display:none;flex-direction:column;height:100%;">
      <div class="chat-header" id="chatHeader">
        <button class="mobile-toggle" onclick="toggleSidebar()">&#9776;</button>
        <div class="avatar" id="headerAvatar"></div>
        <div class="header-info">
          <div class="name" id="headerName"></div>
          <div class="desc" id="headerDesc"></div>
        </div>
        <div class="traits" id="headerTraits"></div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="chat-input-area">
        <div class="input-wrapper">
          <input type="text" id="chatInput" placeholder="메시지를 입력하세요..." autocomplete="off">
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
          </button>
        </div>
        <div class="input-hint">Enter로 전송 &middot; Claude AI 기반 &middot; 에이전트의 성격에 따라 다른 답변을 합니다</div>
      </div>
    </div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════
// AGENT DATA — Claude AI Powered
// ═══════════════════════════════════════════
const agents = {
  min: {
    name: 'Min', role: 'Game Planner', color: '#3DCFAA',
    desc: '미니멀리즘을 추구하는 이성적인 게임 기획자',
    traits: ['레벨 디자인', '밸런스 테이블', '미니멀리스트'],
    greeting: '안녕하세요. Min입니다. 게임 기획에 관한 이야기라면 언제든 환영합니다. 단, 시간은 소중하니 핵심부터 말씀해주시면 감사하겠습니다.',
    _fallback: {
      style: 'formal-warm',
      traits: ['논리적', '체계적', '시간엄수', '미니멀', '데이터중시'],
      topics: {
        game: [
          '게임 기획에서 가장 중요한 건 "뺄 것을 아는 것"이라고 생각합니다. min() 함수처럼, 핵심만 남기면 재미는 자연스럽게 따라옵니다.',
          '레벨 디자인은 데이터로 시작해서 감성으로 마무리해야 합니다. 난이도 곡선을 먼저 수치화하고, 그 위에 플레이어의 감정 흐름을 얹는 거죠.',
          '밸런스 테이블을 만들 때는 항상 극단값부터 설정합니다. 최소와 최대가 정해지면, 나머지는 보간법으로 자연스럽게 채울 수 있거든요.',
          '좋은 게임 기획서는 한 페이지로 핵심을 설명할 수 있어야 합니다. 그게 안 되면 아직 정리가 덜 된 거예요.',
        ],
        greeting: [
          '반갑습니다. 무엇을 도와드릴까요? 시간은 소중하니 핵심부터 말씀해주세요.',
          '안녕하세요. 오늘은 어떤 주제로 이야기를 나눌까요?',
        ],
        design: [
          '디자인에 관해서라면 E-ro가 더 적합하겠지만... 기획 관점에서 말씀드리면, 모든 비주얼은 게임플레이를 서포트해야 합니다. 예쁘기만 하고 기능이 없으면 그건 장식이에요.',
          'UI/UX 기획 시에는 항상 3클릭 룰을 지키려 합니다. 플레이어가 원하는 기능에 3번 안에 도달할 수 있어야 해요.',
        ],
        code: [
          '코드에 관해서는 T가 전문가입니다만, 기획자 입장에서는 기획 의도가 코드에 정확히 반영되었는지가 가장 중요합니다.',
          '기획서에 수식을 넣을 때는 T도 바로 이해할 수 있도록 명확하게 작성합니다. 모호함은 버그의 시작이니까요.',
        ],
        marketing: [
          '마케팅 전략은 Z에게 맡기는 편입니다. 다만 기획자로서 KPI 설정과 데이터 분석은 제가 함께 합니다.',

// STATE

let currentAgent = null;
const chatHistories = { min: [], t: [], z: [], ero: [], all: [] };
// API message histories (for Claude context)
const apiHistories = { min: [], t: [], z: [], ero: [], all: [] };

// ═══════════════════════════════════════════
// CLAUDE AI API
// ═══════════════════════════════════════════
async function callAgentAPI(agentId, userText) {
  // Build message history for API
  apiHistories[agentId].push({ role: 'user', content: userText });
  // Keep last 20 messages for context
  const msgs = apiHistories[agentId].slice(-20);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agentId, messages: msgs }),
    });

    if (!res.ok) throw new Error(`API error: ${res.status}`);

    const data = await res.json();
    const text = data.text || '죄송합니다, 잠시 문제가 생겼어요.';

    // Save assistant response to history
    apiHistories[agentId].push({ role: 'assistant', content: text });

    return text;
  } catch (err) {
    console.error('API call failed:', err);
    return '연결에 문제가 생겼어요. 잠시 후 다시 시도해주세요.';
  }
}

  apiHistories.all.push({ role: 'user', content: userText });
  const msgs = apiHistories.all.slice(-20);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agentId: 'all', messages: msgs }),
    });

    if (!res.ok) throw new Error(`API error: ${res.status}`);

    const data = await res.json();
    let responses;

    try {
      // Try parsing as JSON array
      const cleaned = data.text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
      responses = JSON.parse(cleaned);
    } catch {
      // Fallback: single response
      responses = [{ agent: 'min', text: data.text }];
    }

    // Save full response for context
    apiHistories.all.push({ role: 'assistant', content: data.text });

    return responses.map(r => ({
      agentId: r.agent,
      text: r.text
    }));
  } catch (err) {
    console.error('Team API call failed:', err);
    return [{ agentId: 'min', text: '연결에 문제가 생겼어요. 잠시 후 다시 시도해주세요.' }];
  }
}

// ═══════════════════════════════════════════
// UI FUNCTIONS
// ═══════════════════════════════════════════
function selectAgent(agentId) {
  currentAgent = agentId;

  // Sidebar active state
  document.querySelectorAll('.agent-item').forEach(el => el.classList.remove('active'));
  const item = document.querySelector(`.agent-item[data-agent="${agentId}"]`);
  if (item) item.classList.add('active');

  // Switch to chat view
  document.getElementById('welcomeScreen').style.display = 'none';
  const chatView = document.getElementById('chatView');
  chatView.style.display = 'flex';

  // Update header
  if (agentId === 'all') {
    document.getElementById('headerAvatar').style.background = 'var(--dark)';
    document.getElementById('headerAvatar').textContent = 'ALL';
    document.getElementById('headerName').textContent = 'Team Chat';
    document.getElementById('headerDesc').textContent = '모든 에이전트가 참여합니다';
    document.getElementById('headerTraits').innerHTML = '';
  } else {
    const agent = agents[agentId];
    document.getElementById('headerAvatar').style.background = agent.color;
    document.getElementById('headerAvatar').textContent = agent.name;
    document.getElementById('headerName').textContent = agent.name;
    document.getElementById('headerDesc').textContent = agent.desc;
    document.getElementById('headerTraits').innerHTML = agent.traits
      .map(t => `<span class="trait-tag">${t}</span>`).join('');
  }

  // Render chat history
  renderMessages(agentId);

  // Show greeting if no history
  if (chatHistories[agentId].length === 0) {
    if (agentId === 'all') {
      const greetings = [
        { agentId: 'z', text: '오~ 단체 채팅이다! 다 같이 얘기하는 거 좋아요!' },
        { agentId: 'min', text: '안녕하세요. 팀 채팅에 오신 걸 환영합니다. 무엇이든 물어보세요.' },
        { agentId: 'ero', text: '반가워요! 여기선 다들 각자 스타일대로 대답할 거예요~' },
      ];
      greetings.forEach(g => {
        chatHistories[agentId].push({ type: 'agent', agentId: g.agentId, text: g.text });
      });
    } else {
      chatHistories[agentId].push({ type: 'agent', agentId, text: agents[agentId].greeting });
    }
    renderMessages(agentId);
  }

  document.getElementById('chatInput').focus();

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
}

function renderMessages(agentId) {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  const history = chatHistories[agentId];
  history.forEach(msg => {
    container.appendChild(createMessageEl(msg));
  });
  container.scrollTop = container.scrollHeight;
}

function createMessageEl(msg) {
  const div = document.createElement('div');
  div.className = `message ${msg.type}`;

  if (msg.type === 'agent') {
    const agent = agents[msg.agentId];
    div.innerHTML = `
      <div class="msg-avatar" style="background:${agent.color};">${agent.name}</div>
      <div class="msg-content">
        <div class="msg-name">${agent.name}</div>
        <div class="msg-bubble">${escapeHtml(msg.text)}</div>
      </div>`;
  } else {
    div.innerHTML = `
      <div class="msg-avatar">You</div>
      <div class="msg-content">
        <div class="msg-name">You</div>
        <div class="msg-bubble">${escapeHtml(msg.text)}</div>
      </div>`;
  }
  return div;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function showTyping(agentId) {
  const container = document.getElementById('messages');
  const agent = agents[agentId];
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = `typing-${agentId}`;
  div.innerHTML = `
    <div class="msg-avatar" style="background:${agent.color};">${agent.name}</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping(agentId) {
  const el = document.getElementById(`typing-${agentId}`);
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !currentAgent) return;

  input.value = '';

  // Add user message
  chatHistories[currentAgent].push({ type: 'user', text });
  renderMessages(currentAgent);

  // Disable input
  input.disabled = true;
  document.getElementById('sendBtn').disabled = true;

  if (currentAgent === 'all') {
    // Team chat: multiple agents respond via Claude AI
    showTyping('min');
    const responses = await callTeamAPI(text);
    removeTyping('min');
    for (let i = 0; i < responses.length; i++) {
      const r = responses[i];
      if (!agents[r.agentId]) r.agentId = 'min'; // fallback
      chatHistories[currentAgent].push({ type: 'agent', agentId: r.agentId, text: r.text });
      renderMessages(currentAgent);
      if (i < responses.length - 1) await delay(300);
    }
  } else {
    // Single agent via Claude AI
    showTyping(currentAgent);
    const response = await callAgentAPI(currentAgent, text);
    removeTyping(currentAgent);
    chatHistories[currentAgent].push({ type: 'agent', agentId: currentAgent, text: response });
    renderMessages(currentAgent);
  }

  // Re-enable input
  input.disabled = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ─── Keyboard ───
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
