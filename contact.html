<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MintZero Studio — Contact</title>
<meta name="description" content="MintZero Studio에 게임 문의, 협업 제안을 보내주세요.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%233DCFAA'/><ellipse cx='50' cy='50' rx='18' ry='22' fill='white'/><path d='M44,38 C44,36 46,35 48,36 L60,44 C63,46 63,54 60,56 L48,64 C46,65 44,64 44,62 Z' fill='%233DCFAA'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --mint-primary: #3DCFAA;
    --mint-bright: #5CE0C0;
    --mint-light: #E6F9F3;
    --dark: #2D3142;
    --dark-soft: #3D3F54;
    --gray-700: #4A4E69;
    --gray-500: #9AA5B4;
    --gray-300: #CDD5DE;
    --gray-100: #F4F6F8;
    --white: #FFFFFF;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--white);
    color: var(--dark);
    -webkit-font-smoothing: antialiased;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
    border-bottom: 1px solid var(--gray-100);
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }
  .nav-logo svg { width: 28px; height: 28px; }
  .nav-logo-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--dark);
  }
  .nav-logo-text span { color: var(--mint-primary); }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a {
    font-size: 14px;
    font-weight: 500;
    color: var(--gray-500);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--mint-primary); }
  .nav-links a.active { color: var(--mint-primary); }

  /* ─── HERO ─── */
  .hero {
    padding: 130px 48px 60px;
    background: var(--dark);
    color: var(--white);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(61,207,170,0.15), transparent 70%);
    pointer-events: none;
  }
  .hero h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 12px;
  }
  .hero h1 span { color: var(--mint-primary); }
  .hero .subtitle {
    font-size: 16px;
    color: var(--gray-500);
    letter-spacing: 1px;
  }

  /* ─── CONTAINER ─── */
  .container {
    max-width: 960px;
    margin: 0 auto;
    position: relative;
  }

  /* ─── CONTACT SECTION ─── */
  .contact-section {
    padding: 80px 48px;
  }
  .contact-layout {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 60px;
    align-items: start;
  }

  /* Info side */
  .contact-info {
    padding-top: 8px;
  }
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--mint-primary);
    margin-bottom: 16px;
  }
  .contact-info h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .contact-info p {
    font-size: 14px;
    color: var(--gray-500);
    line-height: 1.8;
    margin-bottom: 28px;
  }
  .email-card {
    background: var(--mint-light);
    border-radius: 16px;
    padding: 24px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }
  .email-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--mint-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .email-icon svg { width: 20px; height: 20px; }
  .email-card a {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--dark);
    text-decoration: none;
    transition: color 0.2s;
  }
  .email-card a:hover { color: var(--mint-primary); }
  .email-card .email-label {
    font-size: 12px;
    color: var(--gray-500);
    margin-bottom: 2px;
  }

  /* Form side */
  .contact-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .form-group label {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-700);
  }
  .form-group input,
  .form-group textarea {
    border: none;
    background: var(--gray-100);
    border-radius: 12px;
    padding: 14px 20px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--dark);
    outline: none;
    transition: box-shadow 0.2s, background 0.2s;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    box-shadow: 0 0 0 2px var(--mint-primary);
    background: var(--white);
  }
  .form-group input::placeholder,
  .form-group textarea::placeholder { color: var(--gray-300); }
  .form-group textarea { resize: vertical; min-height: 140px; }

  .submit-btn {
    border: none;
    background: var(--mint-primary);
    color: var(--white);
    border-radius: 12px;
    padding: 16px 32px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    align-self: flex-start;
  }
  .submit-btn:hover { background: #2BB894; }
  .submit-btn:active { transform: scale(0.98); }

  .form-note {
    font-size: 12px;
    color: var(--gray-300);
    text-align: center;
    margin-top: 8px;
  }

  /* Success message */
  .success-msg {
    display: none;
    background: var(--mint-light);
    border-radius: 16px;
    padding: 32px;
    text-align: center;
  }
  .success-msg h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--mint-primary);
    margin-bottom: 8px;
  }
  .success-msg p {
    font-size: 14px;
    color: var(--gray-500);
  }

  /* ─── FOOTER ─── */
  .footer {
    text-align: center;
    padding: 40px 48px;
    background: var(--dark);
    color: var(--gray-500);
    font-size: 13px;
  }
  .footer span {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    color: var(--mint-primary);
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    nav { padding: 0 24px; }
    .hero { padding: 100px 24px 48px; }
    .hero h1 { font-size: 28px; }
    .contact-section { padding: 48px 24px; }
    .contact-layout {
      grid-template-columns: 1fr;
      gap: 40px;
    }
    .submit-btn { width: 100%; }
  }
</style>
</head>
<body>

<!-- ═══ NAV ═══ -->
<nav>
  <a class="nav-logo" href="/">
    <svg viewBox="0 0 100 100">
      <defs><linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#5CE0C0"/><stop offset="100%" style="stop-color:#3DCFAA"/></linearGradient></defs>
      <path d="M50,5 C72,5 82,5 89,12 C95,18 95,28 95,50 C95,72 95,82 89,88 C82,95 72,95 50,95 C28,95 18,95 12,88 C5,82 5,72 5,50 C5,28 5,18 12,12 C18,5 28,5 50,5 Z" fill="url(#ng)"/>
      <ellipse cx="50" cy="50" rx="18" ry="22" fill="white" opacity="0.95"/>
      <path d="M44,38 C44,36 46,35 48,36 L60,44 C63,46 63,54 60,56 L48,64 C46,65 44,64 44,62 Z" fill="url(#ng)"/>
    </svg>
    <div class="nav-logo-text">Mint<span>Zero</span></div>
  </a>
  <div class="nav-links">
    <a href="/#about">About</a>
    <a href="/#team">Team</a>
    <a href="brand_guide.html">Brand Guide</a>
    <a href="team_agents.html">AI Team</a>
    <a href="contact.html" class="active">Contact</a>
  </div>
</nav>

<!-- ═══ HERO ═══ -->
<header class="hero">
  <div class="container">
    <h1>Get in <span>Touch</span></h1>
    <p class="subtitle">게임 문의, 협업 제안, 무엇이든 환영합니다</p>
  </div>
</header>

<!-- ═══ CONTACT ═══ -->
<section class="contact-section">
  <div class="container">
    <div class="contact-layout">
      <!-- Info -->
      <div class="contact-info">
        <div class="section-label">Contact</div>
        <h2>연락처</h2>
        <p>게임 관련 문의, 협업 제안, 피드백 등<br>무엇이든 편하게 보내주세요.<br>빠른 시일 내에 답변드리겠습니다.</p>

        <div class="email-card">
          <div class="email-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13L2 4"/></svg>
          </div>
          <div>
            <div class="email-label">Email</div>
            <a href="mailto:mintzerostudio@gmail.com">mintzerostudio@gmail.com</a>
          </div>
        </div>
      </div>

      <!-- Form -->
      <div id="formArea">
        <form class="contact-form" id="contactForm" action="https://formsubmit.co/mintzerostudio@gmail.com" method="POST">
          <input type="hidden" name="_subject" value="[MintZero Studio] 새로운 문의">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_template" value="table">
          <input type="hidden" name="_next" value="https://mintzero.vercel.app/contact?sent=1">
          <input type="text" name="_honey" style="display:none">
          <div class="form-group">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" required placeholder="홍길동">
          </div>
          <div class="form-group">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" required placeholder="example@email.com">
          </div>
          <div class="form-group">
            <label for="subject">제목</label>
            <input type="text" id="subject" name="_subject" required placeholder="문의 제목">
          </div>
          <div class="form-group">
            <label for="message">메시지</label>
            <textarea id="message" name="message" rows="6" required placeholder="문의 내용을 작성해주세요"></textarea>
          </div>
          <button type="submit" class="submit-btn">문의 보내기</button>
        </form>

        <div class="success-msg" id="successMsg">
          <h3>문의가 전송되었습니다!</h3>
          <p>빠른 시일 내에 답변드리겠습니다. 감사합니다.</p>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ═══ FOOTER ═══ -->
<footer class="footer">
  <span>MintZero</span> Studio &nbsp;|&nbsp; Beyond Taste, For Everyone.
</footer>

<script>
// Show success message after form submission redirect
if (new URLSearchParams(window.location.search).get('sent') === '1') {
  document.getElementById('contactForm').style.display = 'none';
  document.getElementById('successMsg').style.display = 'block';
}
</script>

</body>
</html>
